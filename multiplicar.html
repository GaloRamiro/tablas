<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendiendo la Tabla del 3!</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>
<body>

    <header>
        <button class="btn-probar" onclick="generarTablas()">🚀 PROBAR</button>
    </header>

    <main class="pizarra">
        <h1 class="titulo">✨ Tabla del 3 ✨</h1>
        
        <div class="tabla" id="miTabla">
            
            <div class="fila">3 x 1 = 3</div>
            <div class="fila">3 x 2 = 6</div>
            <div class="fila">3 x 3 = 9</div>
            <div class="fila">3 x 4 = 12</div>
            <div class="fila">3 x 5 = 15</div>
            <div class="fila">3 x 6 = 18</div>
            <div class="fila">3 x 7 = 21</div>
            <div class="fila">3 x 8 = 24</div>
            <div class="fila">3 x 9 = 27</div>
            <div class="fila">3 x 10 = 30</div>
            
        </div>
    </main>

    <footer class="pie-pagina">
        <p>Creado con ✨ por: <span class="nickname">Galo Cisneros Guallochico</span></p>
    </footer>

</body>
</html>
